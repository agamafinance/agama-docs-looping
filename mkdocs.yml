  - Overview:
      - Introduction: overview/introduction.md
      - Why Agama: overview/why-agama.md
      - The three actors: overview/actors.md
      - Glossary: overview/glossary.md
  - Core V1:
      - Introduction: core/introduction.md
      - Architecture: core/architecture.md
      - Lending Pool:
          - Overview: core/lending-pool/overview.md
          - Functions: core/lending-pool/functions.md
          - Interest Rate Model: core/lending-pool/interest-rate-model.md
      - Asset Adapter Interface: core/adapters/interface.md
      - Stability Pool:
          - Overview: core/stability-pool/overview.md
          - Functions: core/stability-pool/functions.md
          - Liquidations: core/stability-pool/liquidations.md
      - Settlement Vault:
          - Overview: core/settlement-vault/overview.md
          - Functions: core/settlement-vault/functions.md
      - Adapters:
          - AmFi Adapter: core/adapters/amfi.md
          - Nimofast Adapter: core/adapters/nimofast.md
      - Tokens:
          - agTOKEN: core/tokens/agtoken.md
          - DebtToken: core/tokens/debt-token.md
          - agaSP: core/tokens/agasp.md
          - USDXP: core/tokens/usdxp.md
      - Compliance:
          - KYC Registry: core/compliance/kyc-registry.md
          - Qualified Investors: core/compliance/qualified-investors.md
      - Collectors:
          - Fee Collector: core/collectors/fee-collector.md
          - Treasury: core/collectors/treasury.md
          - Reserve Fund: core/collectors/reserve-fund.md
      - Governance: core/governance.md
      - Appendix:
          - RAAC Mapping: core/appendix/raac-mapping.md
          - Error Catalog: core/appendix/errors.md
  - Parameters: parameters.md
  - Design Review: challenges.md
  - Security:
      - Overview: security/overview.md
      - Invariants: security/invariants.md
      - Threat Model: security/threat-model.md
      - Audits: security/audits.md
      - Bug Bounty: security/bug-bounty.md
      - Incident Response: security/incident-response.md
  - Integrate:
      - For Issuers: integrate/for-issuers.md
      - For Developers: integrate/for-developers.md
      - For Institutions: integrate/for-institutions.md
